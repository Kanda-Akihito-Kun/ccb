name: Update CDN Data

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 20 * * 6'  # 每周日东八区凌晨 4 点 (UTC 的前一天 20 点) 运行
  workflow_dispatch:  # 允许手动触发

concurrency:
  group: update-cdn-data
  cancel-in-progress: true

jobs:
  update-cdn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Create Data Directory
        run: mkdir -p data

      - name: Update CDN Data
        run: |
          cat > update.go << 'EOL'
          package main

          import (
              "encoding/json"
              "fmt"
              "io"
              "log"
              "net/http"
              "sort"
              "os"
              "strings"
              "time"
          )

          type Region struct {
              Abbr string
              Name string
          }

          type SubdomainRow struct {
              Subdomain string `json:"subdomain"`
              Type      string `json:"type"`
              Value     string `json:"value"`
              LastSeen  string `json:"last_seen"`
          }

          type Response struct {
              Status int `json:"status"`
              Data   struct {
                  Domain   string         `json:"domain"`
                  AllCount int            `json:"all_count"`
                  Rows     []SubdomainRow `json:"rows"`
              } `json:"data"`
          }

          var (
              regionPatternMap = []Region{
                  {Abbr: "-bj", Name: "北京"},
                  {Abbr: "-sh-", Name: "上海"},
                  {Abbr: "-gdgz-", Name: "广州"},
                  {Abbr: "-sz-", Name: "深圳"},
                  {Abbr: "-zjhz-", Name: "杭州"},
                  {Abbr: "-sccd-", Name: "成都"},
                  {Abbr: "-jsnj-", Name: "南京"},
                  {Abbr: "-tj-", Name: "天津"},
                  {Abbr: "-hbwh-", Name: "武汉"},
                  {Abbr: "-fj", Name: "福建"},
                  {Abbr: "-hnzz-", Name: "郑州"},
                  {Abbr: "-sxxa-", Name: "西安"},
                  {Abbr: "-lnsy-", Name: "沈阳"},
                  {Abbr: "-hljheb-", Name: "哈市"},
                  {Abbr: "-nmghhht-", Name: "呼市"},
                  {Abbr: "-xj-", Name: "新疆"},
                  {Abbr: "-gotcha", Name: "外建"},
                  {Abbr: "-hk-", Name: "香港"},
                  {Abbr: "-kaigai-", Name: "海外"},
              }

              kaigaiCdnList = []string{
                  "upos-hz-mirrorakam.akamaized.net",
                  "upos-sz-mirroraliov.bilivideo.com",
                  "upos-sz-mirrorcosov.bilivideo.com",
              }
          
              fuzhouCdnList = []string{
                  "cn-fjfz-fx-01-01.bilivideo.com",
                  "cn-fjfz-fx-01-02.bilivideo.com",
                  "cn-fjfz-fx-01-03.bilivideo.com",
                  "cn-fjfz-fx-01-04.bilivideo.com",
                  "cn-fjfz-fx-01-05.bilivideo.com",
                  "cn-fjfz-fx-01-06.bilivideo.com",
              }

              cdnMap = make(map[string][]string)
          )

          func matchSubDomainToRegion(response Response) {
              domain := response.Data.Domain
              if domain == "" {
                  domain = "bilivideo.com"
              }
              for _, row := range response.Data.Rows {
                  // 将子域名和主域名拼接为完整的域名
                  fullName := fmt.Sprintf("%s.%s", row.Subdomain, domain)
                  for _, v := range regionPatternMap {
                      if strings.Contains(fullName, v.Abbr) {
                          cdnMap[v.Name] = append(cdnMap[v.Name], fullName)
                      }
                  }
              }
          }
          
          func main() {
              url := "https://api.uutool.cn/web/subdomain/"
              payload := strings.NewReader("domain=bilivideo.com")

              client := &http.Client{Timeout: 15 * time.Second}
              req, err := http.NewRequest("POST", url, payload)
              if err != nil {
                  log.Fatalf("创建请求失败: %v", err)
              }

              // 设置模拟浏览器的请求头
              req.Header.Set("Content-Type", "application/x-www-form-urlencoded; charset=UTF-8")
              req.Header.Set("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36")
              req.Header.Set("Accept", "application/json, text/javascript, */*; q=0.01")
              req.Header.Set("Origin", "https://uutool.cn")
              req.Header.Set("Referer", "https://uutool.cn/")

              resp, err := client.Do(req)
              if err != nil {
                  log.Fatalf("请求失败: %v", err)
              }
              defer resp.Body.Close()

              if resp.StatusCode < 200 || resp.StatusCode >= 300 {
                  log.Fatalf("响应状态异常: %s", resp.Status)
              }

              body, err := io.ReadAll(resp.Body)
              if err != nil {
                  log.Fatalf("读取响应失败: %v", err)
              }

              var response Response
              if err := json.Unmarshal(body, &response); err != nil {
                  log.Fatalf("解析JSON失败: %v", err)
              }

              // 校验接口返回状态（uutool 成功通常返回 1）
              if response.Status != 1 {
                  log.Fatalf("接口返回异常: status=%d", response.Status)
              }

              total := len(response.Data.Rows)
              if total < 50 {
                  log.Fatalf("抓取到的子域数量过少(%d)，疑似被拦截/接口变更，停止覆盖 data/*.json", total)
              }

              matchSubDomainToRegion(response)
          
              // 手动添加
              cdnMap["海外"] = kaigaiCdnList
              cdnMap["福建"] = append(fuzhouCdnList, cdnMap["福建"]...)
          
              // 节点内部排序
              for region := range cdnMap {
                  sort.Strings(cdnMap[region])
              }

              // 生成region列表
              var regionList []string
              for _, v := range regionPatternMap {
                  regionList = append(regionList, v.Name)
              }

              // 保存CDN数据
              cdnData, err := json.MarshalIndent(cdnMap, "", "  ")
              if err != nil {
                  log.Fatal("序列化CDN数据失败:", err)
              }
              if err := os.WriteFile("data/cdn.json", cdnData, 0644); err != nil {
                  log.Fatal("保存CDN数据失败:", err)
              }

              // 保存地区列表
              regionData, err := json.MarshalIndent(regionList, "", "  ")
              if err != nil {
                  log.Fatal("序列化地区列表失败:", err)
              }
              if err := os.WriteFile("data/region.json", regionData, 0644); err != nil {
                  log.Fatal("保存地区列表失败:", err)
              }

              // 保存更新时间
              info := map[string]interface{}{
                  "lastSuccessTime": time.Now().Format(time.RFC3339),
              }
              infoData, err := json.MarshalIndent(info, "", "  ")
              if err != nil {
                  log.Fatal("序列化信息失败:", err)
              }
              if err := os.WriteFile("data/info.json", infoData, 0644); err != nil {
                  log.Fatal("保存信息失败:", err)
              }
          }
          EOL

          go run update.go

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/
          if git diff --cached --quiet; then
            echo "No changes in data/, skip commit."
            exit 0
          fi
          git commit -m "Update CDN data $(date -u)"
          git pull --rebase origin main
          git push
